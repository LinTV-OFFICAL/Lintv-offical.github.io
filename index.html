<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV - Загрузка из JSON + нативный HLS</title>
    <!-- Font Awesome с вашего сервера -->
    <link rel="stylesheet" href="https://cdn.liniptv.2bd.net/assets/all.min.css">
    <!-- HLS.js с вашего сервера -->
    <script src="https://cdn.liniptv.2bd.net/assets/hls.js"></script>
    <!-- DASH.js с вашего сервера -->
    <script src="https://cdn.liniptv.2bd.net/assets/dash.all.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0e0e10; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 1rem 2rem; background: #1a1a1c; border-bottom: 1px solid #2a2a2e; display: flex; align-items: center; gap: 10px; }
        .header i { font-size: 1.8rem; color: #ff8c00; }
        .header h1 { font-size: 1.5rem; font-weight: 400; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: #141416; padding: 1.5rem 0; border-right: 1px solid #2a2a2e; overflow-y: auto; }
        .sidebar-section { margin-bottom: 2rem; }
        .sidebar-title { padding: 0 1.5rem; margin-bottom: 1rem; font-size: 0.85rem; text-transform: uppercase; color: #8f8f9a; }
        .sidebar-list { list-style: none; }
        .sidebar-list li { padding: 0.6rem 1.5rem; display: flex; align-items: center; gap: 12px; color: #d1d1d6; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar-list li i { width: 20px; color: #7b7b85; }
        .sidebar-list li:hover { background: #202024; color: #fff; border-left-color: #ff8c00; }
        .sidebar-list li.active { background: #202024; color: #fff; border-left-color: #ff8c00; }
        .sidebar-list li.active i { color: #ff8c00; }
        .content { flex: 1; padding: 2rem; overflow-y: auto; background: #0b0b0d; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .content-header h2 { font-weight: 400; font-size: 1.4rem; }
        .search-box { background: #1e1e22; border-radius: 30px; padding: 0.3rem 0.3rem 0.3rem 1rem; display: flex; align-items: center; gap: 4px; border: 1px solid #2e2e34; }
        .search-box i { color: #8f8f9a; }
        .search-box input { background: transparent; border: none; color: #fff; outline: none; width: 220px; padding: 0.4rem 0; }
        .search-box input::placeholder { color: #5f5f6b; }
        .search-box button { background: transparent; border: none; color: #8f8f9a; cursor: pointer; padding: 0.5rem 0.8rem; border-radius: 30px; transition: 0.2s; font-size: 1rem; }
        .search-box button:hover { background: #2e2e34; color: #ff8c00; }
        .search-box button:active { transform: scale(0.95); }
        .search-box.listening button { color: #ff8c00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
        .channel-card { background: #18181c; border-radius: 12px; padding: 1.2rem 0.5rem 0.8rem; text-align: center; transition: 0.2s; border: 1px solid #2a2a2e; cursor: pointer; position: relative; }
        .channel-card:hover { background: #23232a; transform: translateY(-4px); border-color: #ff8c00; }
        .channel-icon { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 0.8rem; background: #2a2a30; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .channel-icon img { width: 100%; height: 100%; object-fit: cover; }
        .channel-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.2rem; }
        .channel-category { font-size: 0.7rem; color: #8f8f9a; margin-bottom: 0.6rem; }
        .channel-epg { font-size: 0.7rem; color: #ff8c00; background: #23232a; padding: 0.3rem 0.5rem; border-radius: 4px; margin-top: 0.4rem; border-left: 2px solid #ff8c00; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .channel-epg span { color: #b0b0b0; font-weight: 300; }
        .channel-epg.epg-unavailable { color: #8f8f9a; border-left-color: #8f8f9a; font-style: italic; }
        .channel-epg-next { font-size: 0.65rem; color: #b0b0b0; background: #1a1a1e; padding: 0.2rem 0.5rem; border-radius: 4px; margin-top: 0.2rem; border-left: 2px solid #5f5f6b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .favorite-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); border: none; color: #b0b0b0; font-size: 1.2rem; cursor: pointer; padding: 4px; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 10; }
        .favorite-btn:hover { background: #ff8c00; color: #fff; transform: scale(1.1); }
        .favorite-btn.active { color: #ff8c00; }
        .favorite-btn.active:hover { color: #fff; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0e0e10; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; }
        .loading-logo { font-size: 5rem; color: #ff8c00; margin-bottom: 2rem; animation: logoGlow 2s ease-in-out infinite; }
        @keyframes logoGlow { 0% { text-shadow: 0 0 10px rgba(255,140,0,0.3); transform: scale(1); } 50% { text-shadow: 0 0 30px rgba(255,140,0,0.8); transform: scale(1.1); } 100% { text-shadow: 0 0 10px rgba(255,140,0,0.3); transform: scale(1); } }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid #2a2a2e; border-top: 4px solid #ff8c00; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #8f8f9a; font-size: 1.1rem; margin-bottom: 2rem; }
        .progress-container { width: 300px; height: 4px; background: #2a2a2e; border-radius: 2px; overflow: hidden; margin-bottom: 1rem; }
        .progress-bar { height: 100%; width: 0%; background: #ff8c00; transition: width 0.1s linear; }
        .progress-percent { color: #b0b0b0; font-size: 0.9rem; }
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .player-modal.active { display: flex; }
        .player-container { width: 90%; max-width: 1000px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .player-header { padding: 1rem; background: #1a1a1c; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2e; }
        .player-header h3 { font-size: 1.2rem; font-weight: 400; color: #ff8c00; }
        .close-player { background: none; border: none; color: #8f8f9a; font-size: 1.5rem; cursor: pointer; padding: 0.5rem; transition: color 0.2s; }
        .close-player:hover { color: #ff8c00; }
        video { width: 100%; height: auto; max-height: 70vh; background: #000; display: block; }
        .player-controls { padding: 1rem; background: #1a1a1c; border-top: 1px solid #2a2a2e; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; position: relative; }
        .player-controls button { background: none; border: none; color: #8f8f9a; font-size: 1.2rem; cursor: pointer; padding: 0.5rem; transition: color 0.2s; }
        .player-controls button:hover { color: #ff8c00; }
        .player-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
        .player-controls .channel-info { flex: 1; text-align: right; color: #b0b0b0; font-size: 0.9rem; }
        .player-error { background: #2a1a1a; color: #ff6b6b; padding: 1rem; text-align: center; border-top: 1px solid #ff6b6b; font-size: 0.9rem; }
        .player-format-badge { background: #2a2a2e; color: #b0b0b0; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; margin-left: 1rem; }
        .dropdown-menu { position: absolute; bottom: 100%; left: 0; background: #1a1a1c; border: 1px solid #2a2a2e; border-radius: 8px; padding: 0.5rem 0; min-width: 180px; max-height: 300px; overflow-y: auto; z-index: 1100; display: none; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
        .dropdown-menu.active { display: block; }
        .dropdown-item { padding: 0.6rem 1rem; color: #b0b0b0; cursor: pointer; transition: 0.2s; font-size: 0.9rem; white-space: nowrap; }
        .dropdown-item:hover { background: #202024; color: #ff8c00; }
        .dropdown-item.active { color: #ff8c00; background: #202024; font-weight: 500; }
        .quality-btn, .subtitle-btn { position: relative; }
        .quality-info { font-size: 0.7rem; color: #b0b0b0; margin-left: 0.3rem; }
        /* Стили для подвала с DNS информацией */
        .dns-footer {
            text-align: center;
            padding: 10px;
            background-color: #1a1a1c;
            border-top: 1px solid #2a2a2e;
            font-size: 12px;
            color: #b0b0b0;
        }
        .dns-footer a {
            text-decoration: none;
        }
        @media (max-width: 700px) {
            .sidebar { width: 80px; }
            .sidebar-title { text-align: center; padding: 0 0.2rem; font-size: 0.7rem; }
            .sidebar-list li span { display: none; }
            .sidebar-list li { justify-content: center; padding: 0.8rem 0; }
            .content-header { flex-direction: column; align-items: flex-start; }
            .search-box input { width: 150px; }
            .player-controls .channel-info { width: 100%; text-align: center; margin-top: 0.5rem; }
        }
    </style>
</head>
<body>
    <!-- Анимация загрузки -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-logo"><i class="fas fa-tv"></i></div>
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingStatus">Загрузка IPTV плеера...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
    </div>

    <!-- Шапка -->
    <div class="header"><i class="fas fa-tv"></i><h1>IPTV Каналы</h1></div>

    <!-- Основная часть -->
    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Мои списки</div>
                <ul class="sidebar-list">
                    <li class="active" id="category-all"><i class="fas fa-star"></i><span>Все каналы</span></li>
                    <li id="category-favorites"><i class="fas fa-heart"></i><span>Избранное</span></li>
                </ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Категории</div>
                <ul class="sidebar-list" id="categories-list">
                    <li data-category="Федеральные"><i class="fas fa-tv"></i><span>Федеральные</span></li>
                    <li data-category="Местные"><i class="fas fa-map-marker-alt"></i><span>Местные</span></li>
                    <li data-category="Детские"><i class="fas fa-child"></i><span>Детские</span></li>
                    <li data-category="Музыкальные"><i class="fas fa-music"></i><span>Музыкальные</span></li>
                    <li data-category="Кино и сериалы"><i class="fas fa-film"></i><span>Кино и сериалы</span></li>
                </ul>
            </div>
        </div>

        <div class="content">
            <div class="content-header">
                <h2 id="current-category-title">Все каналы</h2>
                <div class="search-box" id="searchBox">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск каналов...">
                    <button id="voiceSearchBtn" title="Голосовой поиск"><i class="fas fa-microphone"></i></button>
                </div>
            </div>
            <div class="channels-grid" id="channelsGrid"></div>
        </div>
    </div>

    <!-- Подвал с DNS информацией (обновлённый) -->
    <div class="dns-footer">
        DNS Powered by <font color="#006699"><a href="http://www.dnsExit.com">DNS</a></font><a href="http://www.dnsExit.com"><font color="#FF6600">EXIT</font>.COM</a>
    </div>

    <!-- Модальное окно плеера -->
    <div class="player-modal" id="playerModal">
        <div class="player-container">
            <div class="player-header">
                <h3 id="playerChannelTitle">Первый канал</h3>
                <div><span class="player-format-badge" id="playerFormatBadge"></span><button class="close-player" id="closePlayer"><i class="fas fa-times"></i></button></div>
            </div>
            <div class="player-video-container">
                <video id="videoPlayer" controls preload="metadata" playsinline></video>
            </div>
            <div class="player-controls">
                <button id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button id="muteBtn"><i class="fas fa-volume-up"></i></button>
                <button class="quality-btn" id="qualityBtn" title="Качество" disabled><i class="fas fa-cog"></i><span class="quality-info" id="qualityInfo"></span></button>
                <div class="dropdown-menu" id="qualityMenu"></div>
                <button class="subtitle-btn" id="subtitleBtn" title="Субтитры" disabled><i class="fas fa-closed-captioning"></i></button>
                <div class="dropdown-menu" id="subtitleMenu"></div>
                <div class="channel-info" id="playerChannelInfo"></div>
            </div>
            <div class="player-error" id="playerError" style="display:none;"><i class="fas fa-exclamation-triangle"></i><span id="playerErrorMessage">Ошибка воспроизведения.</span></div>
        </div>
    </div>

    <script>
        (function() {
            // ================== КОНФИГУРАЦИЯ ==================
            const CONFIG = {
                channelsUrl: 'channels.json',        // ссылка на JSON с каналами
                epgUrl: 'https://iptvx.one/epg/epg2d.xmltv'      // ссылка на EPG (обновлено)
            };

            // ================== СОСТОЯНИЕ ==================
            const state = {
                channels: [],
                epg: { data: {}, index: {}, loaded: false, error: false },
                epgIcons: {},
                favorites: new Set(JSON.parse(localStorage.getItem('iptv_favorites') || '[]')),
                currentCategory: 'all',
                searchQuery: '',
                player: { hls: null, dash: null, channel: null }
            };

            // ================== ВСПОМОГАТЕЛЬНЫЕ ==================
            const $ = id => document.getElementById(id);
            const $$ = sel => document.querySelectorAll(sel);

            const formatTime = (utc) => {
                if (!utc) return '';
                const deviceOffset = new Date().getTimezoneOffset() * 60 * 1000;
                const localTime = utc + (3 * 60 * 60 * 1000 + deviceOffset); // UTC+3
                return new Date(localTime).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            };

            // ================== УПРАВЛЕНИЕ ЗАГРУЗКОЙ ==================
            const loading = {
                overlay: $('loadingOverlay'),
                status: $('loadingStatus'),
                bar: $('progressBar'),
                percent: $('progressPercent'),
                setProgress(percent, text) {
                    this.bar.style.width = percent + '%';
                    this.percent.textContent = percent + '%';
                    if (text) this.status.textContent = text;
                },
                finish() {
                    setTimeout(() => {
                        this.overlay.classList.add('hidden');
                        document.body.style.opacity = 1;
                    }, 300);
                }
            };

            // ================== ЗАГРУЗКА КАНАЛОВ ИЗ JSON ==================
            async function loadChannels() {
                loading.setProgress(10, 'Загрузка каналов...');
                try {
                    const resp = await fetch(CONFIG.channelsUrl);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    state.channels = await resp.json();
                    loading.setProgress(30, 'Каналы загружены');
                } catch (e) {
                    console.error('Ошибка загрузки каналов:', e);
                    // Тестовые данные на случай ошибки (id первого канала = "1")
                    state.channels = [
                        { id: '1', name: 'Первый канал', category: 'Федеральные', icon: 'https://via.placeholder.com/70/e74c3c/ffffff?text=П', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                        { id: 'channel2', name: 'Россия 1', category: 'Федеральные', icon: 'https://via.placeholder.com/70/3498db/ffffff?text=Р', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                        { id: 'channel3', name: 'НТВ', category: 'Федеральные', icon: 'https://via.placeholder.com/70/2ecc71/ffffff?text=Н', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                        { id: 'channel4', name: 'Матч ТВ', category: 'Федеральные', icon: 'https://via.placeholder.com/70/9b59b6/ffffff?text=М', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                        { id: 'channel5', name: 'Карусель', category: 'Детские', icon: 'https://via.placeholder.com/70/f1c40f/ffffff?text=К', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' }
                    ];
                    loading.setProgress(25, 'Ошибка, тестовые каналы');
                }
            }

            // ================== ЗАГРУЗКА EPG ==================
            async function loadEPG() {
                loading.setProgress(40, 'Загрузка EPG...');
                try {
                    const resp = await fetch(CONFIG.epgUrl);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const xmlText = await resp.text();
                    parseEPG(xmlText);
                    state.epg.loaded = true;
                    loading.setProgress(60, 'EPG обработан');
                } catch (e) {
                    console.error('EPG error:', e);
                    state.epg.error = true;
                    loading.setProgress(50, 'EPG недоступен');
                }
            }

            function parseEPG(xml) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(xml, 'text/xml');
                if (doc.querySelector('parsererror')) {
                    console.error('Ошибка парсинга XML');
                    state.epg.error = true;
                    return;
                }

                state.epg.data = {};
                state.epgIcons = {};

                doc.querySelectorAll('channel').forEach(ch => {
                    const id = ch.getAttribute('id');
                    if (!id) return;
                    const icon = ch.querySelector('icon');
                    if (icon) {
                        const src = icon.getAttribute('src');
                        if (src) state.epgIcons[id] = src;
                    }
                });

                const regex = /^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})(?:\s*([+-]\d{4}))?/;
                doc.querySelectorAll('programme').forEach(p => {
                    const ch = p.getAttribute('channel');
                    const start = p.getAttribute('start');
                    const stop = p.getAttribute('stop');
                    if (!ch || !start || !stop) return;
                    const title = p.querySelector('title')?.textContent || 'Без названия';
                    const s = parseDate(start, regex);
                    const e = parseDate(stop, regex);
                    if (s && e) {
                        if (!state.epg.data[ch]) state.epg.data[ch] = [];
                        state.epg.data[ch].push({ start: s.getTime(), stop: e.getTime(), title });
                    }
                });

                const now = Date.now();
                for (let ch in state.epg.data) {
                    const list = state.epg.data[ch].sort((a, b) => a.start - b.start);
                    let cur = null, nxt = null;
                    let left = 0, right = list.length - 1;
                    while (left <= right) {
                        let mid = (left + right) >> 1;
                        if (list[mid].start <= now && list[mid].stop > now) {
                            cur = list[mid];
                            nxt = list[mid + 1] || null;
                            break;
                        } else if (list[mid].start > now) {
                            right = mid - 1;
                        } else {
                            left = mid + 1;
                        }
                    }
                    if (!cur) {
                        nxt = list.find(p => p.start > now) || null;
                        if (!nxt && list.length) {
                            cur = { ...list[list.length - 1], title: list[list.length - 1].title + ' (повтор)' };
                        }
                    }
                    state.epg.index[ch] = { current: cur, next: nxt };
                }
            }

            function parseDate(str, regex) {
                const m = str.match(regex);
                if (!m) return null;
                let [_, y, mo, d, h, mi, s, off] = m;
                let date = new Date(Date.UTC(+y, +mo - 1, +d, +h, +mi, +s));
                if (off) {
                    let oh = +off.substring(0, 3);
                    let om = +(off[0] + off.substring(3));
                    date.setUTCHours(date.getUTCHours() - oh, date.getUTCMinutes() - om);
                }
                return date;
            }

            // ================== РЕНДЕРИНГ ==================
            const grid = $('channelsGrid');

            function renderChannels() {
                loading.setProgress(80, 'Отрисовка...');
                const fragment = document.createDocumentFragment();
                
                if (state.channels.length === 0) {
                    console.warn('Нет каналов для отображения');
                }

                state.channels.forEach(ch => {
                    const prog = state.epg.index[ch.id] || {};
                    const current = prog.current, next = prog.next;
                    const isFav = state.favorites.has(ch.id);
                    const iconUrl = state.epgIcons[ch.id] || ch.icon;

                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.dataset.id = ch.id;
                    card.dataset.name = ch.name;
                    card.dataset.category = ch.category;

                    let epgHtml = '';
                    if (current) {
                        epgHtml += `<div class="channel-epg"><span>${formatTime(current.start)}</span> ${current.title}</div>`;
                    } else if (next) {
                        epgHtml += `<div class="channel-epg epg-unavailable"><span>→ ${formatTime(next.start)}</span> ${next.title}</div>`;
                    } else {
                        epgHtml += `<div class="channel-epg epg-unavailable">Временно EPG недоступен</div>`;
                    }
                    if (next && current && next.title !== current.title) {
                        epgHtml += `<div class="channel-epg-next"><span>Далее: ${formatTime(next.start)}</span> ${next.title}</div>`;
                    }

                    card.innerHTML = `
                        <button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${ch.id}">
                            <i class="${isFav ? 'fas' : 'far'} fa-star"></i>
                        </button>
                        <div class="channel-icon"><img src="${iconUrl}" alt="${ch.name}" loading="lazy"></div>
                        <div class="channel-name">${ch.name}</div>
                        <div class="channel-category">${ch.category}</div>
                        ${epgHtml}
                    `;
                    fragment.appendChild(card);
                });
                grid.innerHTML = '';
                grid.appendChild(fragment);
                applyFilters();
                loading.setProgress(100, 'Готово');
                loading.finish();
            }

            // ================== ФИЛЬТРАЦИЯ ==================
            function applyFilters() {
                const cards = $$('.channel-card');
                const search = state.searchQuery.toLowerCase().trim();
                cards.forEach(c => {
                    const name = c.dataset.name || '';
                    const cat = c.dataset.category || '';
                    const id = c.dataset.id;
                    let catMatch = false;
                    if (state.currentCategory === 'all') catMatch = true;
                    else if (state.currentCategory === 'favorites') catMatch = state.favorites.has(id);
                    else catMatch = (cat === state.currentCategory);

                    const searchMatch = search === '' || name.toLowerCase().includes(search) || cat.toLowerCase().includes(search);
                    c.style.display = catMatch && searchMatch ? 'block' : 'none';
                });
            }

            function toggleFavorite(id) {
                if (state.favorites.has(id)) state.favorites.delete(id);
                else state.favorites.add(id);
                localStorage.setItem('iptv_favorites', JSON.stringify(Array.from(state.favorites)));
                $$(`.favorite-btn[data-id="${id}"]`).forEach(btn => {
                    const active = state.favorites.has(id);
                    btn.classList.toggle('active', active);
                    btn.querySelector('i').className = active ? 'fas fa-star' : 'far fa-star';
                });
                if (state.currentCategory === 'favorites') applyFilters();
            }

            // ================== ПЛЕЕР (HLS.js + нативный HLS) ==================
            const player = {
                video: $('videoPlayer'),
                modal: $('playerModal'),
                title: $('playerChannelTitle'),
                info: $('playerChannelInfo'),
                format: $('playerFormatBadge'),
                qualityBtn: $('qualityBtn'),
                qualityInfo: $('qualityInfo'),
                qualityMenu: $('qualityMenu'),
                subtitleBtn: $('subtitleBtn'),
                subtitleMenu: $('subtitleMenu'),
                error: $('playerError'),
                errorMsg: $('playerErrorMessage'),

                open(ch) {
                    state.player.channel = ch;
                    this.title.textContent = ch.name;
                    const prog = state.epg.index[ch.id] || {};
                    let info = '';
                    if (prog.current) {
                        info = `📺 ${formatTime(prog.current.start)} ${prog.current.title}`;
                        if (prog.next) info += ` | Далее: ${formatTime(prog.next.start)} ${prog.next.title}`;
                    } else if (prog.next) {
                        info = `→ В ${formatTime(prog.next.start)}: ${prog.next.title}`;
                    } else info = 'EPG недоступен';
                    this.info.textContent = info;
                    this.hideError();
                    this.playStream(ch.url);
                    this.modal.classList.add('active');
                },

                close() {
                    this.video.pause();
                    this.video.src = '';
                    if (state.player.hls) { state.player.hls.destroy(); state.player.hls = null; }
                    if (state.player.dash) { state.player.dash.reset(); state.player.dash = null; }
                    this.modal.classList.remove('active');
                    this.qualityMenu.classList.remove('active');
                    this.subtitleMenu.classList.remove('active');
                    this.qualityInfo.textContent = '';
                },

                playStream(url) {
                    if (state.player.hls) { state.player.hls.destroy(); state.player.hls = null; }
                    if (state.player.dash) { state.player.dash.reset(); state.player.dash = null; }
                    this.qualityBtn.disabled = true;
                    this.subtitleBtn.disabled = true;
                    this.qualityInfo.textContent = '';

                    const isHLS = /\.m3u8|hls|live/i.test(url);
                    const isDASH = /\.mpd|dash/i.test(url);
                    this.format.textContent = isHLS ? 'HLS' : isDASH ? 'DASH' : 'MP4';

                    const showError = (msg) => { this.errorMsg.textContent = msg; this.error.style.display = 'block'; };

                    const attemptPlay = () => {
                        const playPromise = this.video.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(e => console.log('Autoplay blocked:', e));
                        }
                    };

                    if (isHLS) {
                        // Пытаемся использовать HLS.js
                        if (window.Hls && Hls.isSupported()) {
                            try {
                                state.player.hls = new Hls({
                                    abrEwmaDefaultEstimate: 500000,
                                    abrEwmaFastLive: 3.0,
                                    enableWebVTT: true,
                                    enableIMSC1: true,
                                    autoStartLoad: true,
                                    startPosition: -1,
                                    debug: false
                                });
                                
                                state.player.hls.loadSource(url);
                                state.player.hls.attachMedia(this.video);
                                
                                state.player.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                                    state.player.hls.currentLevel = -1;
                                    attemptPlay();
                                    this.updateQualityMenuHLS();
                                    this.updateSubtitleMenuHLS();
                                });
                                
                                state.player.hls.on(Hls.Events.LEVEL_SWITCHED, () => {
                                    this.updateQualityMenuHLS();
                                    const level = state.player.hls.levels[state.player.hls.currentLevel];
                                    this.qualityInfo.textContent = level ? level.height + 'p' : 'Auto';
                                });
                                
                                state.player.hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, () => {
                                    this.updateSubtitleMenuHLS();
                                });
                                
                                state.player.hls.on(Hls.Events.ERROR, (e, data) => {
                                    if (data.fatal) {
                                        let msg = 'Ошибка HLS';
                                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) msg = 'Сетевая ошибка HLS';
                                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) msg = 'Ошибка декодирования HLS';
                                        showError(msg);
                                        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) state.player.hls.currentLevel = -1;
                                    }
                                });
                                return; // HLS.js запущен
                            } catch (e) { 
                                showError('Не удалось инициализировать HLS.js'); 
                            }
                        }
                        
                        // Если HLS.js не поддерживается или произошла ошибка, пробуем нативный HLS
                        if (this.video.canPlayType('application/vnd.apple.mpegurl')) {
                            this.video.src = url;
                            this.video.load();
                            attemptPlay();
                            // Для нативного HLS меню качества и субтитров не работает, отключаем кнопки
                            this.qualityBtn.disabled = true;
                            this.subtitleBtn.disabled = true;
                            return;
                        }
                        
                        showError('HLS не поддерживается браузером');
                        
                    } else if (isDASH && window.dashjs && dashjs.supportsBrowser()) {
                        try {
                            state.player.dash = dashjs.MediaPlayer().create();
                            state.player.dash.updateSettings({ streaming: { abr: { autoSwitchBitrate: { video: true } } } });
                            state.player.dash.initialize(this.video, url, true);
                            state.player.dash.setAutoSwitchQuality(true);
                            state.player.dash.on('error', () => showError('Ошибка DASH'));
                            state.player.dash.on('streamInitialized', () => {
                                attemptPlay();
                                this.updateQualityMenuDASH();
                                this.updateSubtitleMenuDASH();
                                const q = state.player.dash.getQualityFor('video');
                                const list = state.player.dash.getBitrateInfoListFor('video');
                                this.qualityInfo.textContent = (list && list[q]) ? list[q].height + 'p' : 'Auto';
                            });
                            state.player.dash.on('qualityChange', (e) => {
                                if (e.mediaType === 'video') {
                                    const list = state.player.dash.getBitrateInfoListFor('video');
                                    this.qualityInfo.textContent = (list && list[e.newQuality]) ? list[e.newQuality].height + 'p' : 'Auto';
                                }
                            });
                        } catch (e) { showError('Не удалось инициализировать DASH'); }
                    } else {
                        this.video.src = url;
                        this.video.load();
                        attemptPlay();
                    }
                },

                updateQualityMenuHLS() {
                    const hls = state.player.hls;
                    if (!hls || !hls.levels || !hls.levels.length) { 
                        this.qualityBtn.disabled = true; 
                        return; 
                    }
                    this.qualityBtn.disabled = false;
                    const levels = hls.levels;
                    const current = hls.currentLevel;
                    let html = levels.map((l, i) => 
                        `<div class="dropdown-item ${current === i ? 'active' : ''}" data-quality="${i}">${l.height || 'auto'}p (${Math.round(l.bitrate / 1000)} kbps)</div>`
                    ).join('');
                    html += `<div class="dropdown-item ${current === -1 ? 'active' : ''}" data-quality="-1">Авто</div>`;
                    this.qualityMenu.innerHTML = html;
                },

                updateSubtitleMenuHLS() {
                    const hls = state.player.hls;
                    if (!hls || !hls.subtitleTracks || !hls.subtitleTracks.length) { 
                        this.subtitleBtn.disabled = true; 
                        return; 
                    }
                    this.subtitleBtn.disabled = false;
                    const tracks = hls.subtitleTracks;
                    const current = hls.subtitleTrack;
                    let html = '<div class="dropdown-item" data-subtitle="-1">Выкл</div>';
                    tracks.forEach((t, i) => {
                        html += `<div class="dropdown-item ${current === i ? 'active' : ''}" data-subtitle="${i}">${t.name || t.lang || 'Субтитры ' + (i + 1)}</div>`;
                    });
                    this.subtitleMenu.innerHTML = html;
                },

                updateQualityMenuDASH() {
                    const dash = state.player.dash;
                    if (!dash) return;
                    const list = dash.getBitrateInfoListFor('video');
                    if (!list || !list.length) { this.qualityBtn.disabled = true; return; }
                    this.qualityBtn.disabled = false;
                    const current = dash.getQualityFor('video'), auto = dash.getAutoSwitchQualityFor('video');
                    let html = list.map((l, i) => 
                        `<div class="dropdown-item ${current === i && !auto ? 'active' : ''}" data-quality="${i}">${l.height || 'auto'}p (${Math.round(l.bitrate / 1000)} kbps)</div>`
                    ).join('');
                    html += `<div class="dropdown-item ${auto ? 'active' : ''}" data-quality="-1">Авто</div>`;
                    this.qualityMenu.innerHTML = html;
                },

                updateSubtitleMenuDASH() {
                    const dash = state.player.dash;
                    if (!dash) return;
                    const tracks = dash.getTracksFor('text');
                    if (!tracks || !tracks.length) { this.subtitleBtn.disabled = true; return; }
                    this.subtitleBtn.disabled = false;
                    let html = '<div class="dropdown-item" data-subtitle="-1">Выкл</div>';
                    tracks.forEach((t, i) => {
                        html += `<div class="dropdown-item" data-subtitle="${i}">${t.lang || 'Субтитры ' + (i + 1)}</div>`;
                    });
                    this.subtitleMenu.innerHTML = html;
                },

                hideError() { this.error.style.display = 'none'; }
            };

            // ================== ОБРАБОТЧИКИ СОБЫТИЙ ==================
            grid.addEventListener('click', (e) => {
                const card = e.target.closest('.channel-card');
                if (!card) return;
                if (e.target.closest('.favorite-btn')) {
                    toggleFavorite(card.dataset.id);
                    return;
                }
                const ch = state.channels.find(c => c.id === card.dataset.id);
                if (ch) player.open(ch);
            });

            $('category-all').addEventListener('click', () => {
                state.currentCategory = 'all';
                $('current-category-title').textContent = 'Все каналы';
                applyFilters();
                $$('.sidebar-list li').forEach(li => li.classList.remove('active'));
                $('category-all').classList.add('active');
            });

            $('category-favorites').addEventListener('click', () => {
                state.currentCategory = 'favorites';
                $('current-category-title').textContent = 'Избранное';
                applyFilters();
                $$('.sidebar-list li').forEach(li => li.classList.remove('active'));
                $('category-favorites').classList.add('active');
            });

            $$('#categories-list li').forEach(li => {
                li.addEventListener('click', () => {
                    const cat = li.dataset.category;
                    state.currentCategory = cat;
                    $('current-category-title').textContent = cat;
                    applyFilters();
                    $$('.sidebar-list li').forEach(l => l.classList.remove('active'));
                    li.classList.add('active');
                });
            });

            let searchTimer;
            $('searchInput').addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                clearTimeout(searchTimer);
                searchTimer = setTimeout(applyFilters, 150);
            });

            $('closePlayer').addEventListener('click', () => player.close());
            $('playPauseBtn').addEventListener('click', () => {
                if (player.video.paused) player.video.play().catch(() => {});
                else player.video.pause();
            });
            $('muteBtn').addEventListener('click', () => { player.video.muted = !player.video.muted; });

            player.qualityBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                player.subtitleMenu.classList.remove('active');
                player.qualityMenu.classList.toggle('active');
            });
            player.subtitleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                player.qualityMenu.classList.remove('active');
                player.subtitleMenu.classList.toggle('active');
            });
            document.addEventListener('click', () => {
                player.qualityMenu.classList.remove('active');
                player.subtitleMenu.classList.remove('active');
            });
            player.qualityMenu.addEventListener('click', (e) => {
                e.stopPropagation();
                const item = e.target.closest('.dropdown-item');
                if (!item) return;
                const idx = parseInt(item.dataset.quality);
                if (state.player.hls) {
                    state.player.hls.currentLevel = idx;
                    player.updateQualityMenuHLS();
                } else if (state.player.dash) {
                    if (idx === -1) {
                        state.player.dash.setAutoSwitchQualityFor('video', true);
                    } else {
                        state.player.dash.setAutoSwitchQualityFor('video', false);
                        state.player.dash.setQualityFor('video', idx);
                    }
                    player.updateQualityMenuDASH();
                }
                player.qualityMenu.classList.remove('active');
            });
            player.subtitleMenu.addEventListener('click', (e) => {
                e.stopPropagation();
                const item = e.target.closest('.dropdown-item');
                if (!item) return;
                const idx = parseInt(item.dataset.subtitle);
                if (state.player.hls) {
                    state.player.hls.subtitleTrack = idx;
                    player.updateSubtitleMenuHLS();
                } else if (state.player.dash) {
                    if (idx === -1) state.player.dash.setTextTrack(-1);
                    else state.player.dash.setTextTrack(idx);
                }
                player.subtitleMenu.classList.remove('active');
            });

            // ================== ГОЛОСОВОЙ ПОИСК ==================
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                let recognition = null, isListening = false, timeoutId = null;

                function resetRecognition() {
                    if (recognition) { try { recognition.abort(); } catch (e) {} recognition = null; }
                    isListening = false;
                    $('searchBox').classList.remove('listening');
                    if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
                }

                function startListening() {
                    if (isListening) return;
                    resetRecognition();
                    try {
                        recognition = new SpeechRecognition();
                        recognition.lang = 'ru-RU';
                        recognition.interimResults = false;
                        recognition.maxAlternatives = 1;

                        recognition.onstart = () => {
                            isListening = true;
                            $('searchBox').classList.add('listening');
                            timeoutId = setTimeout(() => {
                                if (isListening) { resetRecognition(); alert('Превышено время ожидания.'); }
                            }, 10000);
                        };

                        recognition.onresult = (event) => {
                            const text = event.results[event.results.length - 1][0].transcript;
                            $('searchInput').value = text;
                            state.searchQuery = text;
                            applyFilters();
                            resetRecognition();
                        };

                        recognition.onerror = (event) => {
                            let message = 'Ошибка распознавания';
                            switch (event.error) {
                                case 'no-speech': message = 'Не обнаружено речи'; break;
                                case 'audio-capture': message = 'Не найден микрофон'; break;
                                case 'not-allowed': message = 'Доступ к микрофону запрещён'; break;
                                case 'network': message = 'Ошибка сети'; break;
                                default: message = `Ошибка: ${event.error}`;
                            }
                            alert(message);
                            resetRecognition();
                        };

                        recognition.onend = () => { resetRecognition(); };
                        recognition.start();
                    } catch (e) { alert('Не удалось запустить голосовой ввод'); resetRecognition(); }
                }
                $('voiceSearchBtn').addEventListener('click', startListening);
            } else {
                $('voiceSearchBtn').style.display = 'none';
            }

            // ================== ЗАПУСК ==================
            (async function() {
                await Promise.all([loadChannels(), loadEPG()]);
                renderChannels();
            })();
        })();
    </script>
</body>
</html>
